<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري توجيهك بأمان...</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #161b22;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            border: 1px solid #30363d;
            max-width: 400px;
            width: 100%;
        }
        .logo { font-size: 24px; font-weight: bold; color: #58a6ff; margin-bottom: 15px; }
        .countdown { font-size: 50px; font-weight: bold; color: #58a6ff; margin: 20px 0; }
        .btn { display: inline-block; background-color: #21262d; color: #58a6ff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold; border: 1px solid #30363d; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">Tech Kuala Bridge</div>
    <div id="msg">جاري تجهيز الرابط المباشر للمقال...</div>
    <div class="countdown" id="timer">5</div>
    <a id="action-btn" class="btn" style="display: none;">اضغط هنا للانتقال المباشر</a>
</div>

<script>
    function getUrl() {
        const params = new URLSearchParams(window.location.search);
        let url = params.get('url');
        if(!url) {
            const current = window.location.href;
            const idx = current.indexOf('http', 10);
            if(idx !== -1) { url = current.substring(idx); }
        }
        return url || "https://www.techkuala.com/";
    }

    const target = getUrl();
    let seconds = 5;
    const timerText = document.getElementById('timer');

    const counter = setInterval(function() {
        seconds--;
        timerText.textContent = seconds;
        if (seconds <= 0) {
            clearInterval(counter);
            document.getElementById('msg').textContent = "تم تجهيز الرابط!";
            timerText.style.display = 'none';
            const btn = document.getElementById('action-btn');
            btn.href = target;
            btn.style.display = 'inline-block';
            window.location.href = target;
        }
    }, 1000);
</script>

</body>
</html>
