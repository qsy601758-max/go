<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techkuala | جاري التوجيه بأمان</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #111827;
            padding: 40px;
            border-radius: 12px;
            border-top: 5px solid #04b47c;
            max-width: 350px;
            width: 85%;
        }
        h1 {
            color: #04b47c;
            font-size: 26px;
            margin: 0 0 10px 0;
        }
        p {
            color: #9ca3af;
            font-size: 15px;
            margin: 5px 0;
        }
        .countdown {
            font-size: 64px;
            font-weight: bold;
            color: #04b47c;
            margin: 25px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Techkuala 🖥️</h1>
        <p>جاري نقلك للمقال تلقائياً خلال...</p>
        <div class="countdown" id="timer">5</div>
        <p>اتصال آمن وموثوق 🔒</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let targetUrl = urlParams.get('url') || 'https://www.techkuala.com'; 

        let timeLeft = 5;
        const timerElement = document.getElementById('timer');

        const countdownInterval = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                window.location.href = targetUrl;
            }
        }, 1000);
    </script>

</body>
</html>
